<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roomfit — AI 인테리어 코파일럿</title>
  <meta name="theme-color" content="#0d0f1c" />
  <link rel="manifest" href="/static/manifest.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c14;
      --bg2:       #10111e;
      --glass:     rgba(255,255,255,0.04);
      --glass-md:  rgba(255,255,255,0.07);
      --glass-hi:  rgba(255,255,255,0.11);
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.14);
      --p1:        #38bdf8;
      --p2:        #818cf8;
      --grad:      linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      --grad-soft: linear-gradient(135deg, rgba(56,189,248,.15) 0%, rgba(129,140,248,.15) 100%);
      --text:      #e8eaf6;
      --text-2:    #9496b0;
      --text-3:    #555775;
      --radius:    20px;
      --sh-sm:     0 2px 8px rgba(0,0,0,.4);
      --sh-md:     0 8px 32px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.06) inset;
      --sh-lg:     0 24px 64px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.08) inset;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(56,189,248,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(129,140,248,.06) 0%, transparent 60%);
    }

    /* ── Auth screen ── */
    #authScreen {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .auth-card {
      background: rgba(16,17,30,0.85);
      backdrop-filter: blur(32px) saturate(1.4);
      -webkit-backdrop-filter: blur(32px) saturate(1.4);
      border: 1px solid var(--border-hi);
      border-radius: 28px;
      box-shadow: var(--sh-lg);
      padding: 44px 36px;
      width: 100%; max-width: 400px;
    }
    .auth-logo {
      font-size: 30px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-tagline { color: var(--text-2); font-size: 13px; margin-bottom: 30px; line-height: 1.5; }
    .auth-field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
    .auth-field label {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .auth-field input {
      padding: 13px 16px;
      background: var(--glass); border: 1px solid var(--border); border-radius: 12px;
      font-size: 15px; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .auth-field input::placeholder { color: var(--text-3); }
    .auth-field input:focus {
      border-color: rgba(56,189,248,.5);
      box-shadow: 0 0 0 3px rgba(56,189,248,.1);
    }
    .auth-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 24px; }
    .btn-primary {
      padding: 13px; background: var(--grad); color: #fff; border: none;
      border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 16px rgba(56,189,248,.25);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-outline {
      padding: 13px; background: var(--glass); color: var(--p1);
      border: 1px solid rgba(56,189,248,.3); border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-outline:hover { background: rgba(56,189,248,.1); border-color: rgba(56,189,248,.5); }
    .btn-dev {
      width: 100%; margin-top: 12px; padding: 11px;
      background: var(--glass); color: var(--text-2);
      border: 1px solid var(--border); border-radius: 12px;
      font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .btn-dev:hover { background: var(--glass-md); color: var(--text); }
    #authMsg { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
    #authMsg.error { color: #f87171; }
    #authMsg.success { color: #34d399; }

    /* ── Chat screen ── */
    #chatScreen {
      display: none; flex-direction: column; height: 100vh;
      max-width: 820px; margin: 0 auto; position: relative; z-index: 1;
    }
    #chatScreen.active { display: flex; }

    /* Header */
    .chat-header {
      display: flex; align-items: center; padding: 14px 20px;
      background: rgba(11,12,20,0.75);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(255,255,255,.04);
      flex-shrink: 0; gap: 12px; position: sticky; top: 0; z-index: 10;
    }
    .chat-logo {
      font-size: 20px; font-weight: 800; letter-spacing: -0.8px; flex: 1;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .chat-user { font-size: 12px; color: var(--text-3); }
    .btn-logout {
      padding: 6px 12px; background: var(--glass); color: var(--text-2);
      border: 1px solid var(--border); border-radius: 8px; font-size: 12px; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(248,113,113,.1); color: #f87171; border-color: rgba(248,113,113,.3); }

    /* Messages */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: var(--glass-md) transparent;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--glass-md); border-radius: 4px; }

    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    }
    .msg.ai .avatar {
      background: var(--grad);
      box-shadow: 0 0 12px rgba(56,189,248,.3);
      color: #fff;
    }
    .msg.user .avatar {
      background: var(--glass-md); border: 1px solid var(--border);
      color: var(--text-2);
    }

    .bubble {
      max-width: 72%; padding: 13px 17px; border-radius: 20px;
      font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .msg.ai .bubble {
      background: rgba(16,17,30,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-hi);
      border-bottom-left-radius: 5px;
      box-shadow: var(--sh-md);
    }
    .msg.user .bubble {
      background: var(--grad);
      border-bottom-right-radius: 5px;
      box-shadow: 0 4px 20px rgba(56,189,248,.2);
      color: #fff;
    }

    .bubble-photos { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .bubble-photos img {
      width: 80px; height: 80px; object-fit: cover; border-radius: 10px;
      border: 1px solid rgba(255,255,255,.15);
    }

    /* ── Recommendation card ── */
    .rec-card {
      background: rgba(14,15,26,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-hi); border-radius: 18px;
      padding: 18px; margin-top: 12px;
      box-shadow: var(--sh-md);
      animation: rec-slide-in 0.4s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rec-slide-in {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    .rec-card h4 {
      font-size: 13px; font-weight: 700; margin-bottom: 14px;
      color: var(--text-2); letter-spacing: 0.3px; text-transform: uppercase;
    }
    .rec-summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px;
    }
    .rec-stat {
      background: var(--grad-soft); border: 1px solid rgba(56,189,248,.12);
      border-radius: 12px; padding: 11px 10px; text-align: center;
    }
    .rec-stat .val {
      font-size: 15px; font-weight: 700;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .rec-stat .lbl { font-size: 10px; color: var(--text-3); margin-top: 3px; }

    /* ── Category group with horizontal scroll ── */
    .rec-group { margin-bottom: 20px; }
    .rec-group:last-child { margin-bottom: 0; }
    .rec-group-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    }
    .rec-group-label span { color: var(--text-3); font-weight: 400; }

    /* Horizontal card rail */
    .rec-rail {
      display: flex; gap: 10px;
      overflow-x: auto; padding-bottom: 6px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .rec-rail::-webkit-scrollbar { height: 4px; }
    .rec-rail::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* Individual product card (vertical) */
    .rec-pcard {
      flex: 0 0 160px;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: default;
      position: relative;
    }
    .rec-pcard:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: var(--border-hi);
      box-shadow: 0 12px 32px rgba(0,0,0,.5);
    }
    .rec-pcard.alt { opacity: 0.72; }
    .rec-pcard.alt:hover { opacity: 1; }

    .rec-pcard-img-wrap {
      width: 100%; height: 120px; overflow: hidden;
      background: var(--glass-md); position: relative;
    }
    .rec-pcard-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.35s;
    }
    .rec-pcard:hover .rec-pcard-img-wrap img { transform: scale(1.06); }
    .rec-pcard-img-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center; font-size: 32px;
    }

    .rec-pcard-body { padding: 10px 10px 8px; }
    .rec-pcard .pname {
      font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      min-height: 32px;
    }
    .rec-pcard .pdesc {
      font-size: 10px; color: var(--text-3); margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rec-pcard-footer {
      padding: 0 10px 10px;
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
    }
    .rec-pcard .pprice {
      font-size: 13px; font-weight: 700;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .rec-pcard .pbuy {
      font-size: 10px; font-weight: 700; color: #fff;
      background: var(--grad); padding: 4px 9px; border-radius: 6px;
      text-decoration: none; box-shadow: 0 2px 8px rgba(56,189,248,.2);
      transition: opacity 0.2s; flex-shrink: 0;
    }
    .rec-pcard .pbuy:hover { opacity: 0.85; }

    /* rank badge inside image */
    .rec-pcard .rank-badge {
      position: absolute; top: 7px; left: 7px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.3px;
      padding: 3px 7px; border-radius: 5px; z-index: 1;
    }
    .rec-pcard .rank-badge.top {
      background: var(--grad); color: #fff;
      box-shadow: 0 2px 8px rgba(56,189,248,.4);
    }
    .rec-pcard .rank-badge.other {
      background: rgba(0,0,0,.55); color: var(--text-2);
      backdrop-filter: blur(4px);
    }

    /* source badge */
    .rec-pcard .src-badge {
      position: absolute; top: 7px; right: 7px;
      font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
      background: rgba(0,0,0,.6); color: var(--text-2);
      backdrop-filter: blur(4px); z-index: 1;
    }

    /* ── Loading ── */
    .loading-dots { display: flex; gap: 6px; padding: 4px 0; }
    .loading-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--grad); /* fallback */
      animation: glow-bounce 1.3s ease-in-out infinite;
    }
    .loading-dots span:nth-child(1) { background: var(--p1); }
    .loading-dots span:nth-child(2) { background: #6ee7f7; animation-delay: 0.18s; }
    .loading-dots span:nth-child(3) { background: var(--p2); animation-delay: 0.36s; }
    @keyframes glow-bounce {
      0%,80%,100% { transform: translateY(0) scale(1); opacity: 0.35; }
      40% { transform: translateY(-7px) scale(1.1); opacity: 1; box-shadow: 0 0 8px currentColor; }
    }

    /* ── Input area ── */
    .input-area {
      padding: 10px 16px 18px; flex-shrink: 0;
      background: rgba(11,12,20,0.7);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .input-area.drag-over { border-top-color: var(--p1); }
    .drag-hint {
      display: none; text-align: center; font-size: 12px; font-weight: 600;
      color: var(--p1); padding: 5px 0 2px;
    }
    .input-area.drag-over .drag-hint { display: block; }

    #photoPreview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .preview-thumb { position: relative; width: 58px; height: 58px; }
    .preview-thumb img {
      width: 58px; height: 58px; object-fit: cover; border-radius: 10px;
      border: 1px solid var(--border-hi);
    }
    .preview-thumb .remove-btn {
      position: absolute; top: -5px; right: -5px; width: 18px; height: 18px;
      background: #ef4444; color: #fff; border: none; border-radius: 50%;
      font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }

    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--glass-md); border: 1px solid var(--border-hi);
      border-radius: 18px; padding: 6px 6px 6px 14px;
      box-shadow: var(--sh-md);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-row:focus-within {
      border-color: rgba(56,189,248,.35);
      box-shadow: var(--sh-md), 0 0 0 3px rgba(56,189,248,.07);
    }

    .btn-photo {
      width: 36px; height: 36px; background: transparent; border: none;
      border-radius: 10px; font-size: 18px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); transition: color 0.2s, background 0.2s;
    }
    .btn-photo:hover { color: var(--p1); background: rgba(56,189,248,.08); }

    #msgInput {
      flex: 1; padding: 8px 4px; background: transparent; border: none;
      font-size: 15px; color: var(--text); outline: none; resize: none;
      font-family: inherit; min-height: 36px; max-height: 120px; line-height: 1.5;
    }
    #msgInput::placeholder { color: var(--text-3); }

    #sendBtn {
      width: 36px; height: 36px;
      background: var(--grad); color: #fff; border: none;
      border-radius: 12px; font-size: 16px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(56,189,248,.3);
      transition: opacity 0.2s, transform 0.15s;
    }
    #sendBtn:hover { opacity: 0.85; transform: scale(1.05); }
    #sendBtn:disabled { background: var(--glass-md); box-shadow: none; cursor: not-allowed; transform: none; opacity: 1; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .rec-summary { grid-template-columns: repeat(2, 1fr); }
      .bubble { max-width: 88%; }
      .chat-header { padding: 12px 14px; }
      .messages-area { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<!-- ══ Auth Screen ══ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">room<span>fit</span></div>
    <p class="auth-tagline">AI 인테리어 코파일럿 — 방 사진 한 장으로 가구 추천까지</p>
    <div class="auth-field">
      <label>이메일</label>
      <input id="email" type="email" placeholder="you@example.com" value="dev@roomfit.ai" />
    </div>
    <div class="auth-field">
      <label>비밀번호</label>
      <input id="password" type="password" placeholder="8자 이상" value="devpass1234" />
    </div>
    <div class="auth-btns">
      <button class="btn-outline" onclick="register()">회원가입</button>
      <button class="btn-primary" onclick="login()">로그인</button>
    </div>
    <button class="btn-dev" onclick="devLogin()">⚡ 개발자 모드 (자동 로그인)</button>
    <p id="authMsg"></p>
  </div>
</div>

<!-- ══ Chat Screen ══ -->
<div id="chatScreen">
  <header class="chat-header">
    <div class="chat-logo">room<span>fit</span></div>
    <span class="chat-user" id="chatUserName"></span>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <div class="messages-area" id="messages"></div>

  <div class="input-area" id="inputArea">
    <div class="drag-hint">📷 여기에 놓으면 첨부돼요</div>
    <div id="photoPreview"></div>
    <div class="input-row">
      <button class="btn-photo" onclick="document.getElementById('photoInput').click()" title="사진 첨부">📷</button>
      <input type="file" id="photoInput" accept="image/*" multiple hidden onchange="handlePhotos(event)" />
      <textarea
        id="msgInput"
        placeholder="방에 대해 자유롭게 얘기해 주세요..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="sendBtn" onclick="sendMsg()" title="전송">➤</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let token = localStorage.getItem('rf_token') || '';
let sessionId = null;
let pendingPhotos = []; // {file, objectUrl}

// ── Init ──
(function init() {
  if (token) {
    showChat();
    addWelcomeMsg();
  }
})();

// ── Auth ──
async function register() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  setAuthMsg('');
  try {
    const r = await api('/v1/auth/register', 'POST', { email, password: pw, display_name: email.split('@')[0] });
    token = r.token;
    localStorage.setItem('rf_token', token);
    setAuthMsg('가입 완료! 로그인합니다...', 'success');
    setTimeout(() => { showChat(); addWelcomeMsg(); }, 600);
  } catch (e) {
    setAuthMsg(e.message || '회원가입 실패', 'error');
  }
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  setAuthMsg('');
  try {
    const r = await api('/v1/auth/login', 'POST', { email, password: pw });
    token = r.token;
    localStorage.setItem('rf_token', token);
    showChat();
    addWelcomeMsg();
  } catch (e) {
    setAuthMsg(e.message || '로그인 실패', 'error');
  }
}

async function devLogin() {
  setAuthMsg('개발자 모드로 로그인 중...', '');
  try {
    const r = await api('/v1/dev/session', 'POST', null, true);
    token = r.token;
    localStorage.setItem('rf_token', token);
    showChat();
    addWelcomeMsg();
  } catch (e) {
    // DEV_MODE가 꺼진 경우 일반 로그인으로 시도
    await login();
  }
}

function logout() {
  token = '';
  sessionId = null;
  pendingPhotos = [];
  localStorage.removeItem('rf_token');
  document.getElementById('chatScreen').classList.remove('active');
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('photoPreview').innerHTML = '';
}

// ── UI helpers ──
function showChat() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.add('active');
  // 유저 이름 표시 시도
  api('/v1/me', 'GET').then(r => {
    document.getElementById('chatUserName').textContent = r.user?.display_name || '';
  }).catch(() => {});
}

function setAuthMsg(msg, type = '') {
  const el = document.getElementById('authMsg');
  el.textContent = msg;
  el.className = type;
}

function addWelcomeMsg() {
  addAiMsg('안녕하세요! 저는 **Roomfit AI** 인테리어 코파일럿이에요. 🏠\n\n방 꾸미기에 대해 자유롭게 얘기해 주세요. 예를 들면:\n• "원룸인데 따뜻하고 아늑하게 꾸미고 싶어요"\n• "방 사진 볼게요" (📷 버튼으로 사진 첨부)\n• "예산은 150만원 정도예요"\n\n이야기하다 보면 딱 맞는 가구를 추천해 드릴게요!');
}

// ── Message helpers ──
function addAiMsg(text, recData = null) {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="avatar">RF</div><div class="bubble">${mdToHtml(text)}${recData ? renderRec(recData) : ''}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function addUserMsg(text, photos = []) {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  const photoHtml = photos.length
    ? `<div class="bubble-photos">${photos.map(p => `<img src="${p}" />`).join('')}</div>`
    : '';
  div.innerHTML = `<div class="bubble">${escHtml(text)}${photoHtml}</div><div class="avatar">나</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addLoadingMsg() {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'loadingMsg';
  div.innerHTML = `<div class="avatar">RF</div><div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function removeLoadingMsg() {
  const el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

// ── Send ──
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && pendingPhotos.length === 0) return;

  const displayText = text || '(사진 첨부)';
  const photoUrls = pendingPhotos.map(p => p.objectUrl);
  addUserMsg(displayText, photoUrls);

  input.value = '';
  input.style.height = '';
  document.getElementById('sendBtn').disabled = true;

  const photos = [...pendingPhotos];
  pendingPhotos = [];
  document.getElementById('photoPreview').innerHTML = '';

  addLoadingMsg();

  try {
    const fd = new FormData();
    fd.append('message', displayText);
    if (sessionId) fd.append('session_id', sessionId);
    photos.forEach(p => fd.append('files', p.file));

    const r = await apiFd('/v1/chat', fd);
    removeLoadingMsg();
    sessionId = r.session_id;
    addAiMsg(r.reply, r.recommendation);
  } catch (e) {
    removeLoadingMsg();
    addAiMsg(`오류가 발생했어요: ${e.message}`);
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

function handleKey(e) {
  // isComposing: 한국어 IME 조합 중에는 Enter 무시 (마지막 글자 이중전송 방지)
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Drag & Drop (document-level, most robust) ──
(function initDragDrop() {
  let dragCounter = 0;
  const inputArea = () => document.getElementById('inputArea');

  document.addEventListener('dragenter', e => {
    if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes('Files')) return;
    e.preventDefault();
    dragCounter++;
    inputArea()?.classList.add('drag-over');
  });

  document.addEventListener('dragleave', e => {
    dragCounter = Math.max(0, dragCounter - 1);
    if (dragCounter === 0) inputArea()?.classList.remove('drag-over');
  });

  document.addEventListener('dragover', e => {
    if (e.dataTransfer && Array.from(e.dataTransfer.types).includes('Files')) e.preventDefault();
  });

  document.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    inputArea()?.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer?.files || []).filter(f => f.type.startsWith('image/'));
    if (files.length) addPendingFiles(files);
  });
})();

// ── Photos ──
function addPendingFiles(files) {
  files.forEach(f => {
    const url = URL.createObjectURL(f);
    pendingPhotos.push({ file: f, objectUrl: url });
  });
  renderPhotoPreview();
}

function handlePhotos(e) {
  addPendingFiles(Array.from(e.target.files));
  e.target.value = '';
}

function renderPhotoPreview() {
  const area = document.getElementById('photoPreview');
  area.innerHTML = pendingPhotos.map((p, i) => `
    <div class="preview-thumb">
      <img src="${p.objectUrl}" />
      <button class="remove-btn" onclick="removePhoto(${i})">×</button>
    </div>
  `).join('');
}

function removePhoto(idx) {
  URL.revokeObjectURL(pendingPhotos[idx].objectUrl);
  pendingPhotos.splice(idx, 1);
  renderPhotoPreview();
}

// ── Category icon map ──
const CAT_ICONS = { bed:'🛏', desk:'🪑', chair:'💺', storage:'🗄', sofa:'🛋', table:'🪵' };

// ── Render recommendation ──
const CAT_LABELS = { bed:'침대', desk:'책상', chair:'의자', storage:'수납', sofa:'소파', table:'테이블' };
const SRC_LABELS = {
  ikea_kr:'IKEA', hanssem:'한샘', iloom:'일룸',
  naver_shopping:'네이버', living_house:'리빙하우스',
};

function renderRec(rec) {
  if (!rec || !rec.summary || !rec.items) return '';
  const { summary, items } = rec;
  const price     = summary.total_price_krw?.toLocaleString('ko-KR');
  const usage     = summary.budget_usage_pct;
  const remaining = summary.remaining_budget_krw?.toLocaleString('ko-KR');
  const catCount  = summary.selected_count;

  // 카테고리별 그룹화 (순서 보존)
  const groups = {};
  items.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  const groupsHtml = Object.entries(groups).map(([cat, catItems]) => {
    const icon  = CAT_ICONS[cat] || '🪑';
    const label = CAT_LABELS[cat] || cat;

    const cardsHtml = catItems.map((item, idx) => {
      const isTop = idx === 0;
      const rankBadge = isTop
        ? `<span class="rank-badge top">BEST</span>`
        : `<span class="rank-badge other">${idx + 1}위</span>`;
      const srcLabel = SRC_LABELS[item.source] || item.source || '';
      const srcBadge = srcLabel ? `<span class="src-badge">${escHtml(srcLabel)}</span>` : '';
      const desc = item.description ? `<div class="pdesc">${escHtml(item.description)}</div>` : '';

      const imgInner = item.image_url
        ? `<img src="${escHtml(item.image_url)}" alt="" loading="lazy"
             onerror="this.style.display='none';this.parentNode.querySelector('.rec-pcard-img-ph').style.display='flex'"
           ><div class="rec-pcard-img-ph" style="display:none">${icon}</div>`
        : `<div class="rec-pcard-img-ph">${icon}</div>`;

      const buyBtn = item.url
        ? `<a class="pbuy" href="${escHtml(item.url)}" target="_blank" rel="noopener">구매</a>`
        : '';

      return `
        <div class="rec-pcard${isTop ? '' : ' alt'}">
          <div class="rec-pcard-img-wrap">
            ${rankBadge}${srcBadge}
            ${imgInner}
          </div>
          <div class="rec-pcard-body">
            <div class="pname">${escHtml(item.name)}</div>
            ${desc}
          </div>
          <div class="rec-pcard-footer">
            <div class="pprice">${item.price_krw?.toLocaleString('ko-KR')}원</div>
            ${buyBtn}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="rec-group">
        <div class="rec-group-label">${icon} ${label} <span>(${catItems.length}개 옵션)</span></div>
        <div class="rec-rail">${cardsHtml}</div>
      </div>`;
  }).join('');

  return `
    <div class="rec-card">
      <h4>🛋 AI 추천 가구 — ${catCount}개 카테고리</h4>
      <div class="rec-summary">
        <div class="rec-stat"><div class="val">${price}원</div><div class="lbl">총 금액 (1순위 기준)</div></div>
        <div class="rec-stat"><div class="val">${usage}%</div><div class="lbl">예산 사용률</div></div>
        <div class="rec-stat"><div class="val">${remaining}원</div><div class="lbl">잔여 예산</div></div>
      </div>
      ${groupsHtml}
    </div>`;
}

// ── API helpers ──
async function api(path, method = 'GET', body = null, noAuth = false) {
  const headers = { 'Content-Type': 'application/json' };
  if (!noAuth && token) headers['Authorization'] = `Bearer ${token}`;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

async function apiFd(path, fd) {
  const headers = {};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const r = await fetch(path, { method: 'POST', headers, body: fd });
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

// ── Utils ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mdToHtml(text) {
  // 간단한 마크다운 처리 (bold, bullet)
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^• (.+)$/gm, '<span style="display:block;padding-left:12px">• $1</span>');
}
