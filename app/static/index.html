<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roomfit — AI 인테리어 코파일럿</title>
  <meta name="theme-color" content="#35c5f0" />
  <link rel="manifest" href="/static/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --primary: #35c5f0;
      --primary-dark: #1da8d4;
      --text: #1a1a1a;
      --text-muted: #888;
      --border: #e0e0e0;
      --ai-bubble: #ffffff;
      --user-bubble: #35c5f0;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Auth screen ── */
    #authScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .auth-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 40px 32px; width: 100%; max-width: 400px;
    }
    .auth-logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
    .auth-logo span { color: var(--primary); }
    .auth-tagline { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .auth-field label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .auth-field input {
      padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 15px; outline: none; transition: border 0.2s;
    }
    .auth-field input:focus { border-color: var(--primary); }
    .auth-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .btn-primary {
      padding: 12px; background: var(--primary); color: #fff; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline {
      padding: 12px; background: transparent; color: var(--primary); border: 1.5px solid var(--primary);
      border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-outline:hover { background: var(--primary); color: #fff; }
    .btn-dev {
      width: 100%; margin-top: 12px; padding: 10px; background: #f0f0f0; color: var(--text-muted);
      border: none; border-radius: 10px; font-size: 13px; cursor: pointer; transition: background 0.2s;
    }
    .btn-dev:hover { background: #e0e0e0; }
    #authMsg { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
    #authMsg.error { color: #e53e3e; }
    #authMsg.success { color: #38a169; }

    /* ── Chat screen ── */
    #chatScreen {
      display: none; flex-direction: column; height: 100vh; max-width: 800px;
      margin: 0 auto;
    }
    #chatScreen.active { display: flex; }

    /* Header */
    .chat-header {
      display: flex; align-items: center; padding: 14px 18px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05); flex-shrink: 0; gap: 12px;
    }
    .chat-logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; flex: 1; }
    .chat-logo span { color: var(--primary); }
    .chat-user { font-size: 13px; color: var(--text-muted); }
    .btn-logout {
      padding: 6px 12px; background: transparent; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 8px; font-size: 12px; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: #fee; color: #e53e3e; border-color: #e53e3e; }

    /* Messages */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .msg.ai .avatar { background: var(--primary); color: #fff; }
    .msg.user .avatar { background: #e8e8e8; color: var(--text); }
    .bubble {
      max-width: 72%; padding: 12px 16px; border-radius: 18px;
      font-size: 15px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
    }
    .msg.ai .bubble {
      background: var(--ai-bubble); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; box-shadow: var(--shadow);
    }
    .msg.user .bubble {
      background: var(--user-bubble); color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Photo previews inside message */
    .bubble-photos { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .bubble-photos img {
      width: 80px; height: 80px; object-fit: cover; border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.3);
    }

    /* Recommendation card */
    .rec-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 16px; margin-top: 10px; box-shadow: var(--shadow);
    }
    .rec-card h4 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .rec-summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px;
    }
    .rec-stat { background: var(--bg); border-radius: 10px; padding: 10px 12px; text-align: center; }
    .rec-stat .val { font-size: 17px; font-weight: 700; color: var(--primary); }
    .rec-stat .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .rec-items { display: flex; flex-direction: column; gap: 8px; }
    .rec-item {
      display: flex; align-items: center;
      padding: 10px 12px; background: var(--bg); border-radius: 10px; gap: 10px;
    }
    .rec-item-img {
      width: 56px; height: 56px; object-fit: cover; border-radius: 8px;
      flex-shrink: 0; background: var(--border);
    }
    .rec-item-img-placeholder {
      width: 56px; height: 56px; border-radius: 8px; flex-shrink: 0;
      background: var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .rec-item-info { flex: 1; min-width: 0; }
    .rec-item .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rec-item .cat { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .rec-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .rec-item .price { font-size: 13px; font-weight: 700; color: var(--primary); }
    .rec-item a {
      font-size: 11px; color: #fff; background: var(--primary);
      padding: 3px 8px; border-radius: 6px; text-decoration: none; white-space: nowrap;
    }
    .rec-item a:hover { background: var(--primary-dark); }
    .rec-group { margin-bottom: 14px; }
    .rec-group:last-child { margin-bottom: 0; }
    .rec-group-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .rec-item.alt { opacity: 0.82; }
    .rec-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: var(--primary); color: #fff; }
    .rec-badge.alt { background: var(--border); color: var(--text-muted); }

    /* Loading bubble */
    .loading-dots { display: flex; gap: 5px; padding: 4px 0; }
    .loading-dots span {
      width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 12px 16px 20px; flex-shrink: 0;
      transition: background 0.15s;
    }
    .input-area.drag-over {
      background: #e8f7fd;
      border-top-color: var(--primary);
    }
    .drag-hint {
      display: none; text-align: center; font-size: 13px;
      color: var(--primary); font-weight: 600; padding: 6px 0 2px;
    }
    .input-area.drag-over .drag-hint { display: block; }
    #photoPreview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .preview-thumb {
      position: relative; width: 60px; height: 60px;
    }
    .preview-thumb img {
      width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border);
    }
    .preview-thumb .remove-btn {
      position: absolute; top: -6px; right: -6px; width: 18px; height: 18px;
      background: #e53e3e; color: #fff; border: none; border-radius: 50%;
      font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .btn-photo {
      width: 44px; height: 44px; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; font-size: 20px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .btn-photo:hover { background: var(--primary); border-color: var(--primary); }
    #msgInput {
      flex: 1; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 15px; outline: none; resize: none; font-family: inherit;
      transition: border 0.2s; min-height: 44px; max-height: 120px;
    }
    #msgInput:focus { border-color: var(--primary); }
    #sendBtn {
      width: 44px; height: 44px; background: var(--primary); color: #fff;
      border: none; border-radius: 12px; font-size: 20px; cursor: pointer;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #sendBtn:hover { background: var(--primary-dark); }
    #sendBtn:disabled { background: var(--border); cursor: not-allowed; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .rec-summary { grid-template-columns: repeat(2, 1fr); }
      .bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

<!-- ══ Auth Screen ══ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">room<span>fit</span></div>
    <p class="auth-tagline">AI 인테리어 코파일럿 — 방 사진 한 장으로 가구 추천까지</p>
    <div class="auth-field">
      <label>이메일</label>
      <input id="email" type="email" placeholder="you@example.com" value="dev@roomfit.ai" />
    </div>
    <div class="auth-field">
      <label>비밀번호</label>
      <input id="password" type="password" placeholder="8자 이상" value="devpass1234" />
    </div>
    <div class="auth-btns">
      <button class="btn-outline" onclick="register()">회원가입</button>
      <button class="btn-primary" onclick="login()">로그인</button>
    </div>
    <button class="btn-dev" onclick="devLogin()">⚡ 개발자 모드 (자동 로그인)</button>
    <p id="authMsg"></p>
  </div>
</div>

<!-- ══ Chat Screen ══ -->
<div id="chatScreen">
  <header class="chat-header">
    <div class="chat-logo">room<span>fit</span></div>
    <span class="chat-user" id="chatUserName"></span>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <div class="messages-area" id="messages"></div>

  <div class="input-area" id="inputArea">
    <div class="drag-hint">📷 여기에 놓으면 첨부돼요</div>
    <div id="photoPreview"></div>
    <div class="input-row">
      <button class="btn-photo" onclick="document.getElementById('photoInput').click()" title="사진 첨부">📷</button>
      <input type="file" id="photoInput" accept="image/*" multiple hidden onchange="handlePhotos(event)" />
      <textarea
        id="msgInput"
        placeholder="방에 대해 자유롭게 얘기해 주세요..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="sendBtn" onclick="sendMsg()" title="전송">➤</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let token = localStorage.getItem('rf_token') || '';
let sessionId = null;
let pendingPhotos = []; // {file, objectUrl}

// ── Init ──
(function init() {
  if (token) {
    showChat();
    addWelcomeMsg();
  }
})();

// ── Auth ──
async function register() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  setAuthMsg('');
  try {
    const r = await api('/v1/auth/register', 'POST', { email, password: pw, display_name: email.split('@')[0] });
    token = r.token;
    localStorage.setItem('rf_token', token);
    setAuthMsg('가입 완료! 로그인합니다...', 'success');
    setTimeout(() => { showChat(); addWelcomeMsg(); }, 600);
  } catch (e) {
    setAuthMsg(e.message || '회원가입 실패', 'error');
  }
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  setAuthMsg('');
  try {
    const r = await api('/v1/auth/login', 'POST', { email, password: pw });
    token = r.token;
    localStorage.setItem('rf_token', token);
    showChat();
    addWelcomeMsg();
  } catch (e) {
    setAuthMsg(e.message || '로그인 실패', 'error');
  }
}

async function devLogin() {
  setAuthMsg('개발자 모드로 로그인 중...', '');
  try {
    const r = await api('/v1/dev/session', 'POST', null, true);
    token = r.token;
    localStorage.setItem('rf_token', token);
    showChat();
    addWelcomeMsg();
  } catch (e) {
    // DEV_MODE가 꺼진 경우 일반 로그인으로 시도
    await login();
  }
}

function logout() {
  token = '';
  sessionId = null;
  pendingPhotos = [];
  localStorage.removeItem('rf_token');
  document.getElementById('chatScreen').classList.remove('active');
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('photoPreview').innerHTML = '';
}

// ── UI helpers ──
function showChat() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.add('active');
  // 유저 이름 표시 시도
  api('/v1/me', 'GET').then(r => {
    document.getElementById('chatUserName').textContent = r.user?.display_name || '';
  }).catch(() => {});
}

function setAuthMsg(msg, type = '') {
  const el = document.getElementById('authMsg');
  el.textContent = msg;
  el.className = type;
}

function addWelcomeMsg() {
  addAiMsg('안녕하세요! 저는 **Roomfit AI** 인테리어 코파일럿이에요. 🏠\n\n방 꾸미기에 대해 자유롭게 얘기해 주세요. 예를 들면:\n• "원룸인데 따뜻하고 아늑하게 꾸미고 싶어요"\n• "방 사진 볼게요" (📷 버튼으로 사진 첨부)\n• "예산은 150만원 정도예요"\n\n이야기하다 보면 딱 맞는 가구를 추천해 드릴게요!');
}

// ── Message helpers ──
function addAiMsg(text, recData = null) {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="avatar">RF</div><div class="bubble">${mdToHtml(text)}${recData ? renderRec(recData) : ''}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function addUserMsg(text, photos = []) {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  const photoHtml = photos.length
    ? `<div class="bubble-photos">${photos.map(p => `<img src="${p}" />`).join('')}</div>`
    : '';
  div.innerHTML = `<div class="bubble">${escHtml(text)}${photoHtml}</div><div class="avatar">나</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addLoadingMsg() {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'loadingMsg';
  div.innerHTML = `<div class="avatar">RF</div><div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function removeLoadingMsg() {
  const el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

// ── Send ──
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && pendingPhotos.length === 0) return;

  const displayText = text || '(사진 첨부)';
  const photoUrls = pendingPhotos.map(p => p.objectUrl);
  addUserMsg(displayText, photoUrls);

  input.value = '';
  input.style.height = '';
  document.getElementById('sendBtn').disabled = true;

  const photos = [...pendingPhotos];
  pendingPhotos = [];
  document.getElementById('photoPreview').innerHTML = '';

  addLoadingMsg();

  try {
    const fd = new FormData();
    fd.append('message', displayText);
    if (sessionId) fd.append('session_id', sessionId);
    photos.forEach(p => fd.append('files', p.file));

    const r = await apiFd('/v1/chat', fd);
    removeLoadingMsg();
    sessionId = r.session_id;
    addAiMsg(r.reply, r.recommendation);
  } catch (e) {
    removeLoadingMsg();
    addAiMsg(`오류가 발생했어요: ${e.message}`);
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

function handleKey(e) {
  // isComposing: 한국어 IME 조합 중에는 Enter 무시 (마지막 글자 이중전송 방지)
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Drag & Drop (document-level, most robust) ──
(function initDragDrop() {
  let dragCounter = 0;
  const inputArea = () => document.getElementById('inputArea');

  document.addEventListener('dragenter', e => {
    if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes('Files')) return;
    e.preventDefault();
    dragCounter++;
    inputArea()?.classList.add('drag-over');
  });

  document.addEventListener('dragleave', e => {
    dragCounter = Math.max(0, dragCounter - 1);
    if (dragCounter === 0) inputArea()?.classList.remove('drag-over');
  });

  document.addEventListener('dragover', e => {
    if (e.dataTransfer && Array.from(e.dataTransfer.types).includes('Files')) e.preventDefault();
  });

  document.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    inputArea()?.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer?.files || []).filter(f => f.type.startsWith('image/'));
    if (files.length) addPendingFiles(files);
  });
})();

// ── Photos ──
function addPendingFiles(files) {
  files.forEach(f => {
    const url = URL.createObjectURL(f);
    pendingPhotos.push({ file: f, objectUrl: url });
  });
  renderPhotoPreview();
}

function handlePhotos(e) {
  addPendingFiles(Array.from(e.target.files));
  e.target.value = '';
}

function renderPhotoPreview() {
  const area = document.getElementById('photoPreview');
  area.innerHTML = pendingPhotos.map((p, i) => `
    <div class="preview-thumb">
      <img src="${p.objectUrl}" />
      <button class="remove-btn" onclick="removePhoto(${i})">×</button>
    </div>
  `).join('');
}

function removePhoto(idx) {
  URL.revokeObjectURL(pendingPhotos[idx].objectUrl);
  pendingPhotos.splice(idx, 1);
  renderPhotoPreview();
}

// ── Category icon map ──
const CAT_ICONS = { bed:'🛏', desk:'🪑', chair:'💺', storage:'🗄', sofa:'🛋', table:'🪵' };

// ── Render recommendation ──
const CAT_LABELS = { bed:'침대', desk:'책상', chair:'의자', storage:'수납', sofa:'소파', table:'테이블' };

function renderRec(rec) {
  if (!rec || !rec.summary || !rec.items) return '';
  const { summary, items } = rec;
  const price = summary.total_price_krw?.toLocaleString('ko-KR');
  const usage = summary.budget_usage_pct;
  const remaining = summary.remaining_budget_krw?.toLocaleString('ko-KR');

  // 카테고리별 그룹화
  const groups = {};
  items.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  const groupsHtml = Object.entries(groups).map(([cat, catItems]) => {
    const icon = CAT_ICONS[cat] || '🪑';
    const label = CAT_LABELS[cat] || cat;
    const itemsHtml = catItems.map((item, idx) => {
      const imgHtml = item.image_url
        ? `<img class="rec-item-img" src="${escHtml(item.image_url)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="rec-item-img-placeholder" style="display:none">${icon}</div>`
        : `<div class="rec-item-img-placeholder">${icon}</div>`;
      const badge = idx === 0 ? '<span class="rec-badge">추천</span>' : `<span class="rec-badge alt">${idx+1}위</span>`;
      return `
        <div class="rec-item${idx > 0 ? ' alt' : ''}">
          ${imgHtml}
          <div class="rec-item-info">
            <div class="name">${escHtml(item.name)}</div>
            <div class="cat">${badge}</div>
          </div>
          <div class="rec-item-right">
            <div class="price">${item.price_krw?.toLocaleString('ko-KR')}원</div>
            ${item.url ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener">구매</a>` : ''}
          </div>
        </div>`;
    }).join('');

    return `<div class="rec-group"><div class="rec-group-label">${icon} ${label}</div>${itemsHtml}</div>`;
  }).join('');

  return `
    <div class="rec-card">
      <h4>🛋 추천 가구 목록</h4>
      <div class="rec-summary">
        <div class="rec-stat"><div class="val">${price}원</div><div class="lbl">총 금액(1위 기준)</div></div>
        <div class="rec-stat"><div class="val">${usage}%</div><div class="lbl">예산 사용</div></div>
        <div class="rec-stat"><div class="val">${remaining}원</div><div class="lbl">잔여 예산</div></div>
      </div>
      <div class="rec-items">${groupsHtml}</div>
    </div>`;
}

// ── API helpers ──
async function api(path, method = 'GET', body = null, noAuth = false) {
  const headers = { 'Content-Type': 'application/json' };
  if (!noAuth && token) headers['Authorization'] = `Bearer ${token}`;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

async function apiFd(path, fd) {
  const headers = {};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const r = await fetch(path, { method: 'POST', headers, body: fd });
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

// ── Utils ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mdToHtml(text) {
  // 간단한 마크다운 처리 (bold, bullet)
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^• (.+)$/gm, '<span style="display:block;padding-left:12px">• $1</span>');
}
