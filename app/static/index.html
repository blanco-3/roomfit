<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roomfit — AI 인테리어 코파일럿</title>
  <meta name="theme-color" content="#0d0f1c" />
  <link rel="manifest" href="/static/manifest.json" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ── */
    :root {
      --bg:        #0a0e27;
      --bg2:       #0e1230;
      --glass:     rgba(255,255,255,0.04);
      --glass-md:  rgba(255,255,255,0.07);
      --glass-hi:  rgba(255,255,255,0.11);
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.15);
      --p1:        #38bdf8;
      --p2:        #818cf8;
      --grad:      linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      --grad-soft: linear-gradient(135deg, rgba(56,189,248,.13) 0%, rgba(129,140,248,.13) 100%);
      --text:      #e8eaf6;
      --text-2:    #9496b0;
      --text-3:    #555775;
      --radius:    20px;
      --sh-sm:     0 2px 8px rgba(0,0,0,.5);
      --sh-md:     0 8px 32px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.05) inset;
      --sh-lg:     0 24px 64px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.07) inset;
      /* glow variants */
      --glow-p1:   0 0 20px rgba(56,189,248,.35), 0 0 40px rgba(56,189,248,.15);
      --glow-p2:   0 0 20px rgba(129,140,248,.35), 0 0 40px rgba(129,140,248,.15);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════════════════
       ANIMATED GRADIENT MESH BACKGROUND
       3 blurred orbs drifting slowly — CSS only, no JS
    ══════════════════════════════════════════════════ */

    /* Orb 1 + 2 — left-top navy blob & right-bottom purple blob */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 65% 55% at 18% 22%, rgba(30,58,95,.80) 0%, transparent 65%),
        radial-gradient(ellipse 55% 50% at 80% 78%, rgba(45,27,105,.72) 0%, transparent 65%);
      animation: orb-drift-ab 22s ease-in-out infinite alternate;
    }
    @keyframes orb-drift-ab {
      0%   { transform: translate(0%,   0%  ) scale(1);    }
      30%  { transform: translate(3%,   5%  ) scale(1.04); }
      60%  { transform: translate(-2%,  8%  ) scale(0.97); }
      100% { transform: translate(5%,  -4%  ) scale(1.02); }
    }

    /* Orb 3 — centre electric-blue mid blob */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 50% 45% at 52% 48%, rgba(30,58,95,.50) 0%, transparent 62%);
      animation: orb-drift-c 30s ease-in-out infinite alternate;
    }
    @keyframes orb-drift-c {
      0%   { transform: translate(0%,   0%  ) scale(1);    }
      40%  { transform: translate(-6%,  4%  ) scale(1.06); }
      100% { transform: translate(4%,  -6%  ) scale(0.95); }
    }

    /* ── Auth screen ── */
    #bgCanvas {
      position: fixed; inset: 0; z-index: 1;
      width: 100%; height: 100%; pointer-events: none; display: block;
    }
    #authScreen {
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }

    .auth-card {
      /* premium glass card */
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      box-shadow:
        var(--sh-lg),
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 1px 0 rgba(255,255,255,.10) inset;
      padding: 44px 36px;
      width: 100%; max-width: 400px;
      animation: auth-card-in 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes auth-card-in {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }

    .auth-logo {
      font-size: 30px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-tagline { color: var(--text-2); font-size: 13px; margin-bottom: 30px; line-height: 1.5; }
    .auth-field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
    .auth-field label {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .auth-field input {
      padding: 13px 16px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px;
      font-size: 15px; color: var(--text); outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .auth-field input::placeholder { color: var(--text-3); }
    .auth-field input:focus {
      border-color: rgba(56,189,248,.55);
      box-shadow: 0 0 0 3px rgba(56,189,248,.12), var(--glow-p1);
    }

    .auth-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 24px; }

    .btn-primary {
      padding: 13px; background: var(--grad); color: #fff; border: none;
      border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 16px rgba(56,189,248,.3);
      transition: transform 0.18s cubic-bezier(.22,1,.36,1), box-shadow 0.18s;
    }
    .btn-primary:hover {
      transform: scale(1.02) translateY(-1px);
      box-shadow: 0 6px 24px rgba(56,189,248,.45), var(--glow-p1);
    }
    .btn-primary:active { transform: scale(0.98); }

    .btn-outline {
      padding: 13px; background: rgba(255,255,255,0.04); color: var(--p1);
      border: 1px solid rgba(56,189,248,.3); border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: transform 0.18s cubic-bezier(.22,1,.36,1), background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .btn-outline:hover {
      transform: scale(1.02) translateY(-1px);
      background: rgba(56,189,248,.10); border-color: rgba(56,189,248,.55);
      box-shadow: 0 4px 16px rgba(56,189,248,.2);
    }
    .btn-outline:active { transform: scale(0.98); }

    .btn-dev {
      width: 100%; margin-top: 12px; padding: 11px;
      background: var(--glass); color: var(--text-2);
      border: 1px solid var(--border); border-radius: 12px;
      font-size: 13px; cursor: pointer;
      transition: transform 0.18s, background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn-dev:hover {
      transform: scale(1.02);
      background: var(--glass-md); color: var(--text);
      box-shadow: 0 4px 14px rgba(0,0,0,.3);
    }

    #authMsg { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
    #authMsg.error { color: #f87171; }
    #authMsg.success { color: #34d399; }

    /* ── Chat screen ── */
    #chatScreen {
      display: none; flex-direction: column; height: 100vh;
      max-width: 820px; margin: 0 auto; position: relative; z-index: 1;
    }
    #chatScreen.active { display: flex; }

    /* Header */
    .chat-header {
      display: flex; align-items: center; padding: 14px 20px;
      background: rgba(10,14,39,0.80);
      backdrop-filter: blur(28px) saturate(1.8);
      -webkit-backdrop-filter: blur(28px) saturate(1.8);
      border-bottom: 1px solid rgba(255,255,255,.07);
      box-shadow: 0 1px 0 rgba(255,255,255,.04), 0 4px 20px rgba(0,0,0,.3);
      flex-shrink: 0; gap: 12px; position: sticky; top: 0; z-index: 10;
    }
    .chat-logo {
      font-size: 20px; font-weight: 800; letter-spacing: -0.8px; flex: 1;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .chat-user { font-size: 12px; color: var(--text-3); }
    .btn-logout {
      padding: 6px 12px; background: var(--glass); color: var(--text-2);
      border: 1px solid var(--border); border-radius: 8px; font-size: 12px; cursor: pointer;
      transition: transform 0.18s, background 0.2s, color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover {
      transform: scale(1.02);
      background: rgba(248,113,113,.1); color: #f87171; border-color: rgba(248,113,113,.35);
    }

    /* Messages */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: var(--glass-md) transparent;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--glass-md); border-radius: 4px; }

    /* Message entrance animation */
    .msg {
      display: flex; gap: 10px; align-items: flex-end;
      animation: bubble-in 0.4s ease-out both;
    }
    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    }
    .msg.ai .avatar {
      background: var(--grad);
      box-shadow: 0 0 14px rgba(56,189,248,.35), 0 0 28px rgba(56,189,248,.12);
      color: #fff;
    }
    .msg.user .avatar {
      background: var(--glass-md); border: 1px solid var(--border);
      color: var(--text-2);
    }

    .bubble {
      max-width: 72%; padding: 13px 17px; border-radius: 20px;
      font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    /* AI bubble: premium glass */
    .msg.ai .bubble {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid rgba(255,255,255,.09);
      border-bottom-left-radius: 5px;
      box-shadow:
        var(--sh-md),
        0 0 0 1px rgba(255,255,255,.03) inset;
    }
    /* 추천 카드 포함 버블은 더 넓게 */
    .msg.ai .bubble:has(.rec-card) { max-width: 92%; }
    .msg.user .bubble {
      background: var(--grad);
      border-bottom-right-radius: 5px;
      box-shadow: 0 4px 20px rgba(56,189,248,.22), 0 0 0 1px rgba(255,255,255,.1) inset;
      color: #fff;
    }

    .bubble-photos { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .bubble-photos img {
      width: 80px; height: 80px; object-fit: cover; border-radius: 10px;
      border: 1px solid rgba(255,255,255,.15);
    }

    /* ══════════════════════════════════════════════════
       RECOMMENDATION CARD — gradient border via
       padding-box / border-box background-clip trick
    ══════════════════════════════════════════════════ */
    .rec-card {
      background:
        linear-gradient(rgba(10,14,39,0.94), rgba(10,14,39,0.94)) padding-box,
        linear-gradient(135deg, rgba(56,189,248,.35) 0%, rgba(129,140,248,.35) 100%) border-box;
      border: 1px solid transparent;
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border-radius: 18px;
      padding: 14px; margin-top: 12px;
      box-shadow:
        var(--sh-md),
        0 0 40px rgba(56,189,248,.06),
        0 0 1px rgba(255,255,255,.06) inset;
      animation: rec-slide-in 0.45s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rec-slide-in {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    .rec-card h4 {
      font-size: 13px; font-weight: 700; margin-bottom: 14px;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 0.3px; text-transform: uppercase;
    }
    .rec-summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px;
    }
    .rec-stat {
      background: var(--grad-soft); border: 1px solid rgba(56,189,248,.12);
      border-radius: 12px; padding: 11px 10px; text-align: center;
    }
    .rec-stat .val {
      font-size: 15px; font-weight: 700;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .rec-stat .lbl { font-size: 10px; color: var(--text-3); margin-top: 3px; }

    /* ── Category group with horizontal scroll ── */
    .rec-group { margin-bottom: 20px; }
    .rec-group:last-child { margin-bottom: 0; }
    .rec-group-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
    }
    .rec-group-label span { color: var(--text-3); font-weight: 400; }

    /* Horizontal card rail */
    .rec-rail {
      display: flex; gap: 10px;
      overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      perspective: 800px;
    }
    .rec-rail::-webkit-scrollbar { height: 4px; }
    .rec-rail::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* Individual product card — stagger via :nth-child */
    .rec-pcard {
      flex: 0 0 162px;
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 14px; overflow: hidden;
      position: relative;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      will-change: transform;
      transition: transform 0.6s ease, border-color 0.25s, box-shadow 0.25s;
      /* entrance animation — common */
      animation: card-pop 0.4s cubic-bezier(.22,1,.36,1) both;
    }
    @media (min-width: 600px) { .rec-pcard { flex: 0 0 200px; } }
    /* stagger delays */
    .rec-pcard:nth-child(1) { animation-delay: 0.05s; }
    .rec-pcard:nth-child(2) { animation-delay: 0.13s; }
    .rec-pcard:nth-child(3) { animation-delay: 0.21s; }
    @keyframes card-pop {
      from { opacity: 0; transform: translateY(14px) scale(0.95); }
      to   { opacity: 1; transform: none; }
    }

    .rec-pcard:hover {
      border-color: rgba(56,189,248,.30);
      box-shadow: 0 20px 48px rgba(0,0,0,.65), 0 0 22px rgba(56,189,248,.18),
                  0 0 0 1px rgba(56,189,248,.06) inset;
    }
    .rec-pcard.alt { opacity: 0.70; }
    .rec-pcard.alt:hover { opacity: 1; }

    /* ── 3D Tilt: mouse-position light reflection ── */
    .rec-pcard::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: radial-gradient(
        circle at var(--light-x, 50%) var(--light-y, 50%),
        rgba(255,255,255,.18) 0%, rgba(255,255,255,.06) 30%, transparent 65%
      );
      opacity: 0; pointer-events: none; z-index: 3;
      transition: opacity 0.2s;
    }
    .rec-pcard.tilt-active::after { opacity: 1; }

    /* ── Image shine sweep on hover (CSS only, left → right) ── */
    .rec-pcard-img-wrap::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,.26) 50%, transparent 65%);
      transform: translateX(-100%); transition: none;
    }
    .rec-pcard:hover .rec-pcard-img-wrap::after {
      transform: translateX(200%);
      transition: transform 0.55s ease;
    }

    /* ── Placeholder icon: float feel on hover ── */
    .rec-pcard:hover .rec-pcard-img-ph {
      text-shadow: 0 0 18px rgba(56,189,248,.55), 0 6px 14px rgba(0,0,0,.45);
      transform: scale(1.1);
    }

    /* ── Mobile: no tilt — tap scale instead ── */
    @media (pointer: coarse) {
      .rec-pcard { transition: transform 0.12s ease, border-color 0.2s, box-shadow 0.2s; }
      .rec-pcard:active {
        transform: scale(0.96);
        border-color: rgba(56,189,248,.35);
        box-shadow: 0 0 16px rgba(56,189,248,.2);
      }
    }

    .rec-pcard-img-wrap {
      width: 100%; height: 140px; overflow: hidden;
      background: rgba(255,255,255,.04); position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .rec-pcard-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.38s cubic-bezier(.22,1,.36,1);
    }
    .rec-pcard:hover .rec-pcard-img-wrap img { transform: scale(1.08); }
    .rec-pcard-img-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center; font-size: 40px;
      background: var(--glass-hi);
      transition: transform 0.3s ease, text-shadow 0.3s;
    }

    .rec-pcard-body { padding: 8px 6px; flex: 1; }
    .rec-pcard .pname {
      font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .rec-pcard .pdesc {
      font-size: 10px; color: var(--text-3); margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rec-pcard-footer {
      padding: 0 8px 8px;
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
    }
    .rec-pcard .pprice {
      font-size: 14px; font-weight: 700;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .rec-pcard .pbuy {
      font-size: 10px; font-weight: 700; color: #fff;
      background: var(--grad); padding: 5px 10px; border-radius: 6px;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(56,189,248,.25);
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
      flex-shrink: 0;
    }
    .rec-pcard .pbuy:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 14px rgba(56,189,248,.45);
    }

    /* rank badge inside image */
    .rec-pcard .rank-badge {
      position: absolute; top: 7px; left: 7px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.3px;
      padding: 3px 7px; border-radius: 5px; z-index: 1;
    }
    .rec-pcard .rank-badge.top {
      background: var(--grad); color: #fff;
      box-shadow: 0 2px 10px rgba(56,189,248,.5);
    }
    .rec-pcard .rank-badge.other {
      background: rgba(0,0,0,.6); color: var(--text-2);
      backdrop-filter: blur(4px);
    }

    /* source badge */
    .rec-pcard .src-badge {
      position: absolute; top: 7px; right: 7px;
      font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
      background: rgba(0,0,0,.62); color: var(--text-2);
      backdrop-filter: blur(4px); z-index: 1;
    }

    /* ── Loading ── */
    .loading-dots { display: flex; gap: 6px; padding: 4px 0; }
    .loading-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      animation: glow-bounce 1.3s ease-in-out infinite;
    }
    .loading-dots span:nth-child(1) { background: var(--p1); }
    .loading-dots span:nth-child(2) { background: #6ee7f7; animation-delay: 0.18s; }
    .loading-dots span:nth-child(3) { background: var(--p2); animation-delay: 0.36s; }
    @keyframes glow-bounce {
      0%,80%,100% { transform: translateY(0) scale(1); opacity: 0.35; }
      40% { transform: translateY(-7px) scale(1.15); opacity: 1; box-shadow: 0 0 10px currentColor; }
    }

    /* ── Input area ── */
    .input-area {
      padding: 10px 16px 18px; flex-shrink: 0;
      background: rgba(10,14,39,0.75);
      backdrop-filter: blur(28px) saturate(1.6); -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border-top: 1px solid rgba(255,255,255,.06);
      transition: border-color 0.2s;
    }
    .input-area.drag-over { border-top-color: var(--p1); }
    .drag-hint {
      display: none; text-align: center; font-size: 12px; font-weight: 600;
      color: var(--p1); padding: 5px 0 2px;
    }
    .input-area.drag-over .drag-hint { display: block; }

    #photoPreview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .preview-thumb { position: relative; width: 58px; height: 58px; }
    .preview-thumb img {
      width: 58px; height: 58px; object-fit: cover; border-radius: 10px;
      border: 1px solid var(--border-hi);
    }
    .preview-thumb .remove-btn {
      position: absolute; top: -5px; right: -5px; width: 18px; height: 18px;
      background: #ef4444; color: #fff; border: none; border-radius: 50%;
      font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }

    /* Input row — glass + inner glow */
    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px; padding: 6px 6px 6px 14px;
      box-shadow:
        var(--sh-md),
        0 1px 0 rgba(255,255,255,.06) inset,
        0 -1px 0 rgba(0,0,0,.15) inset;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-row:focus-within {
      border-color: rgba(56,189,248,.40);
      box-shadow:
        var(--sh-md),
        0 0 0 3px rgba(56,189,248,.08),
        0 0 20px rgba(56,189,248,.10),
        0 1px 0 rgba(255,255,255,.07) inset;
    }

    .btn-photo {
      width: 36px; height: 36px; background: transparent; border: none;
      border-radius: 10px; font-size: 18px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
      transition: transform 0.18s, color 0.2s, background 0.2s;
    }
    .btn-photo:hover {
      transform: scale(1.08);
      color: var(--p1); background: rgba(56,189,248,.09);
    }

    #msgInput {
      flex: 1; padding: 8px 4px; background: transparent; border: none;
      font-size: 15px; color: var(--text); outline: none; resize: none;
      font-family: inherit; min-height: 36px; max-height: 120px; line-height: 1.5;
    }
    #msgInput::placeholder { color: var(--text-3); }

    #sendBtn {
      width: 36px; height: 36px;
      background: var(--grad); color: #fff; border: none;
      border-radius: 12px; font-size: 16px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(56,189,248,.35);
      transition: transform 0.18s cubic-bezier(.22,1,.36,1), box-shadow 0.18s;
    }
    #sendBtn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 20px rgba(56,189,248,.55), var(--glow-p1);
    }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled {
      background: var(--glass-md); box-shadow: none;
      cursor: not-allowed; transform: none; opacity: 1;
    }

    .hidden { display: none !important; }

    /* ── Isometric floor plan ── */
    .rec-floorplan-wrap {
      margin-bottom: 18px; height: 200px; border-radius: 12px; overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.08);
    }
    .rec-floorplan-wrap canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
    .rec-floorplan-lbl {
      position: absolute; top: 8px; right: 10px; font-size: 10px; font-weight: 600;
      color: var(--text-3); pointer-events: none; letter-spacing: 0.6px; text-transform: uppercase;
    }
    @media (min-width: 600px) { .rec-floorplan-wrap { height: 280px; } }
    .rec-pcard.fp-active {
      border-color: rgba(56,189,248,.6) !important;
      box-shadow: 0 0 0 2px rgba(56,189,248,.25), 0 12px 32px rgba(0,0,0,.5) !important;
      transform: scale(1.04) translateY(-4px) !important;
      transition: all 0.15s ease !important;
    }

    @media (max-width: 480px) {
      .rec-summary { grid-template-columns: repeat(2, 1fr); }
      .bubble { max-width: 88%; }
      .chat-header { padding: 12px 14px; }
      .messages-area { padding: 16px 12px; }
    }
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<!-- ══ Auth Screen ══ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">room<span>fit</span></div>
    <p class="auth-tagline">AI 인테리어 코파일럿 — 방 사진 한 장으로 가구 추천까지</p>
    <div class="auth-field">
      <label>이메일</label>
      <input id="email" type="email" placeholder="you@example.com" value="dev@roomfit.ai" />
    </div>
    <div class="auth-field">
      <label>비밀번호</label>
      <input id="password" type="password" placeholder="8자 이상" value="devpass1234" />
    </div>
    <div class="auth-btns">
      <button class="btn-outline" onclick="register()">회원가입</button>
      <button class="btn-primary" onclick="login()">로그인</button>
    </div>
    <button class="btn-dev" onclick="devLogin()">⚡ 개발자 모드 (자동 로그인)</button>
    <p id="authMsg"></p>
  </div>
</div>

<!-- ══ Chat Screen ══ -->
<div id="chatScreen">
  <header class="chat-header">
    <div class="chat-logo">room<span>fit</span></div>
    <span class="chat-user" id="chatUserName"></span>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <div class="messages-area" id="messages"></div>

  <div class="input-area" id="inputArea">
    <div class="drag-hint">📷 여기에 놓으면 첨부돼요</div>
    <div id="photoPreview"></div>
    <div class="input-row">
      <button class="btn-photo" onclick="document.getElementById('photoInput').click()" title="사진 첨부">📷</button>
      <input type="file" id="photoInput" accept="image/*" multiple hidden onchange="handlePhotos(event)" />
      <textarea
        id="msgInput"
        placeholder="방에 대해 자유롭게 얘기해 주세요..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="sendBtn" onclick="sendMsg()" title="전송">➤</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let token = localStorage.getItem('rf_token') || '';
let sessionId = null;
let pendingPhotos = []; // {file, objectUrl}

// ── Init ──
(function init() {
  if (token) {
    showChat();
    addWelcomeMsg();
  }
})();

// ── Auth ──
async function register() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  setAuthMsg('');
  try {
    const r = await api('/v1/auth/register', 'POST', { email, password: pw, display_name: email.split('@')[0] });
    token = r.token;
    localStorage.setItem('rf_token', token);
    setAuthMsg('가입 완료! 로그인합니다...', 'success');
    setTimeout(() => { showChat(); addWelcomeMsg(); }, 600);
  } catch (e) {
    setAuthMsg(e.message || '회원가입 실패', 'error');
  }
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  setAuthMsg('');
  try {
    const r = await api('/v1/auth/login', 'POST', { email, password: pw });
    token = r.token;
    localStorage.setItem('rf_token', token);
    showChat();
    addWelcomeMsg();
  } catch (e) {
    setAuthMsg(e.message || '로그인 실패', 'error');
  }
}

async function devLogin() {
  setAuthMsg('개발자 모드로 로그인 중...', '');
  try {
    const r = await api('/v1/dev/session', 'POST', null, true);
    token = r.token;
    localStorage.setItem('rf_token', token);
    showChat();
    addWelcomeMsg();
  } catch (e) {
    // DEV_MODE가 꺼진 경우 일반 로그인으로 시도
    await login();
  }
}

function logout() {
  token = '';
  sessionId = null;
  pendingPhotos = [];
  localStorage.removeItem('rf_token');
  document.getElementById('chatScreen').classList.remove('active');
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('photoPreview').innerHTML = '';
  if (window._threeStart) window._threeStart();
}

// ── UI helpers ──
function showChat() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.add('active');
  if (window._threeStop) window._threeStop();
  // 유저 이름 표시 시도
  api('/v1/me', 'GET').then(r => {
    document.getElementById('chatUserName').textContent = r.user?.display_name || '';
  }).catch(() => {});
}

function setAuthMsg(msg, type = '') {
  const el = document.getElementById('authMsg');
  el.textContent = msg;
  el.className = type;
}

function addWelcomeMsg() {
  addAiMsg('안녕하세요! 저는 **Roomfit AI** 인테리어 코파일럿이에요. 🏠\n\n방 꾸미기에 대해 자유롭게 얘기해 주세요. 예를 들면:\n• "원룸인데 따뜻하고 아늑하게 꾸미고 싶어요"\n• "방 사진 볼게요" (📷 버튼으로 사진 첨부)\n• "예산은 150만원 정도예요"\n\n이야기하다 보면 딱 맞는 가구를 추천해 드릴게요!');
}

// ── Message helpers ──
function addAiMsg(text, recData = null) {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="avatar">RF</div><div class="bubble">${mdToHtml(text)}${recData ? renderRec(recData) : ''}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  if (recData) { const _id = 'fp' + _fpN; requestAnimationFrame(() => fpInit(_id, recData)); }
  return div;
}

function addUserMsg(text, photos = []) {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  const photoHtml = photos.length
    ? `<div class="bubble-photos">${photos.map(p => `<img src="${p}" />`).join('')}</div>`
    : '';
  div.innerHTML = `<div class="bubble">${escHtml(text)}${photoHtml}</div><div class="avatar">나</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addLoadingMsg() {
  const area = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'loadingMsg';
  div.innerHTML = `<div class="avatar">RF</div><div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function removeLoadingMsg() {
  const el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

// ── Send ──
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && pendingPhotos.length === 0) return;

  const displayText = text || '(사진 첨부)';
  const photoUrls = pendingPhotos.map(p => p.objectUrl);
  addUserMsg(displayText, photoUrls);

  input.value = '';
  input.style.height = '';
  document.getElementById('sendBtn').disabled = true;

  const photos = [...pendingPhotos];
  pendingPhotos = [];
  document.getElementById('photoPreview').innerHTML = '';

  addLoadingMsg();

  try {
    const fd = new FormData();
    fd.append('message', displayText);
    if (sessionId) fd.append('session_id', sessionId);
    photos.forEach(p => fd.append('files', p.file));

    const r = await apiFd('/v1/chat', fd);
    removeLoadingMsg();
    sessionId = r.session_id;
    addAiMsg(r.reply, r.recommendation);
  } catch (e) {
    removeLoadingMsg();
    addAiMsg(`오류가 발생했어요: ${e.message}`);
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

function handleKey(e) {
  // isComposing: 한국어 IME 조합 중에는 Enter 무시 (마지막 글자 이중전송 방지)
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Drag & Drop (document-level, most robust) ──
(function initDragDrop() {
  let dragCounter = 0;
  const inputArea = () => document.getElementById('inputArea');

  document.addEventListener('dragenter', e => {
    if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes('Files')) return;
    e.preventDefault();
    dragCounter++;
    inputArea()?.classList.add('drag-over');
  });

  document.addEventListener('dragleave', e => {
    dragCounter = Math.max(0, dragCounter - 1);
    if (dragCounter === 0) inputArea()?.classList.remove('drag-over');
  });

  document.addEventListener('dragover', e => {
    if (e.dataTransfer && Array.from(e.dataTransfer.types).includes('Files')) e.preventDefault();
  });

  document.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    inputArea()?.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer?.files || []).filter(f => f.type.startsWith('image/'));
    if (files.length) addPendingFiles(files);
  });
})();

// ── Photos ──
function addPendingFiles(files) {
  files.forEach(f => {
    const url = URL.createObjectURL(f);
    pendingPhotos.push({ file: f, objectUrl: url });
  });
  renderPhotoPreview();
}

function handlePhotos(e) {
  addPendingFiles(Array.from(e.target.files));
  e.target.value = '';
}

function renderPhotoPreview() {
  const area = document.getElementById('photoPreview');
  area.innerHTML = pendingPhotos.map((p, i) => `
    <div class="preview-thumb">
      <img src="${p.objectUrl}" />
      <button class="remove-btn" onclick="removePhoto(${i})">×</button>
    </div>
  `).join('');
}

function removePhoto(idx) {
  URL.revokeObjectURL(pendingPhotos[idx].objectUrl);
  pendingPhotos.splice(idx, 1);
  renderPhotoPreview();
}

// ── Floor plan canvas counter ──
let _fpN = 0;

// ── Category icon map ──
const CAT_ICONS = { bed:'🛏', desk:'🪑', chair:'💺', storage:'🗄', sofa:'🛋', table:'🪵' };

// ── Render recommendation ──
const CAT_LABELS = { bed:'침대', desk:'책상', chair:'의자', storage:'수납', sofa:'소파', table:'테이블' };
const SRC_LABELS = {
  ikea_kr:'IKEA', hanssem:'한샘', iloom:'일룸',
  naver_shopping:'네이버', living_house:'리빙하우스',
};

function renderRec(rec) {
  if (!rec || !rec.summary || !rec.items) return '';
  const { summary, items } = rec;
  const price     = summary.total_price_krw?.toLocaleString('ko-KR');
  const usage     = summary.budget_usage_pct;
  const remaining = summary.remaining_budget_krw?.toLocaleString('ko-KR');
  const catCount  = summary.selected_count;

  // 카테고리별 그룹화 (순서 보존)
  const groups = {};
  items.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  const groupsHtml = Object.entries(groups).map(([cat, catItems]) => {
    const icon  = CAT_ICONS[cat] || '🪑';
    const label = CAT_LABELS[cat] || cat;

    const cardsHtml = catItems.map((item, idx) => {
      const isTop = idx === 0;
      const rankBadge = isTop
        ? `<span class="rank-badge top">BEST</span>`
        : `<span class="rank-badge other">${idx + 1}위</span>`;
      const srcLabel = SRC_LABELS[item.source] || item.source || '';
      const srcBadge = srcLabel ? `<span class="src-badge">${escHtml(srcLabel)}</span>` : '';
      const desc = item.description ? `<div class="pdesc">${escHtml(item.description)}</div>` : '';

      const imgInner = item.image_url
        ? `<img src="${escHtml(item.image_url)}" alt="" loading="lazy"
             onerror="this.style.display='none';this.parentNode.querySelector('.rec-pcard-img-ph').style.display='flex'"
           ><div class="rec-pcard-img-ph" style="display:none">${icon}</div>`
        : `<div class="rec-pcard-img-ph">${icon}</div>`;

      const buyBtn = item.url
        ? `<a class="pbuy" href="${escHtml(item.url)}" target="_blank" rel="noopener">구매</a>`
        : '';

      return `
        <div class="rec-pcard${isTop ? '' : ' alt'}" data-cat="${item.category}" data-rank="${idx+1}">
          <div class="rec-pcard-img-wrap">
            ${rankBadge}${srcBadge}
            ${imgInner}
          </div>
          <div class="rec-pcard-body">
            <div class="pname">${escHtml(item.name)}</div>
            ${desc}
          </div>
          <div class="rec-pcard-footer">
            <div class="pprice">${item.price_krw?.toLocaleString('ko-KR')}원</div>
            ${buyBtn}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="rec-group">
        <div class="rec-group-label">${icon} ${label} <span>(${catItems.length}개 옵션)</span></div>
        <div class="rec-rail">${cardsHtml}</div>
      </div>`;
  }).join('');

  const fpId = 'fp' + (++_fpN);
  return `
    <div class="rec-card">
      <h4>🛋 AI 추천 가구 — ${catCount}개 카테고리</h4>
      <div class="rec-summary">
        <div class="rec-stat"><div class="val">${price}원</div><div class="lbl">총 금액 (1순위 기준)</div></div>
        <div class="rec-stat"><div class="val">${usage}%</div><div class="lbl">예산 사용률</div></div>
        <div class="rec-stat"><div class="val">${remaining}원</div><div class="lbl">잔여 예산</div></div>
      </div>
      <div class="rec-floorplan-wrap"><canvas id="${fpId}"></canvas><div class="rec-floorplan-lbl">평면도 Plan</div></div>
      ${groupsHtml}
    </div>`;
}

// ── API helpers ──
async function api(path, method = 'GET', body = null, noAuth = false) {
  const headers = { 'Content-Type': 'application/json' };
  if (!noAuth && token) headers['Authorization'] = `Bearer ${token}`;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

async function apiFd(path, fd) {
  const headers = {};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const r = await fetch(path, { method: 'POST', headers, body: fd });
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

// ── Utils ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mdToHtml(text) {
  // Qwen3 <think>...</think> 블록 제거 (닫힘 태그 없는 경우도 처리)
  text = text.replace(/<think>[\s\S]*?<\/think>/gi, '');
  text = text.replace(/<think>[\s\S]*/gi, '');
  text = text.trim();
  // 간단한 마크다운 처리 (bold, bullet)
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^• (.+)$/gm, '<span style="display:block;padding-left:12px">• $1</span>');
}

// ══════════════════════════════════════════════════
// ISOMETRIC FLOOR PLAN — 2D canvas, no deps
// ══════════════════════════════════════════════════
const FP_RGB = {
  bed:[56,189,248], desk:[129,140,248], chair:[52,211,153],
  storage:[251,146,60], sofa:[192,132,252], table:[110,231,183],
};
const FP_ZONES = {
  bed:{fx:.04,fy:.04}, sofa:{fx:.04,fy:.58},
  desk:{fx:.56,fy:.04}, chair:{fx:.60,fy:.32},
  storage:{fx:.84,fy:.04}, table:{fx:.26,fy:.62},
};

// World → screen (wx,wy in cm; wz in px)
function fpIso(wx,wy,wz,o,s){
  return {x:o.x+(wx-wy)*.866*s, y:o.y+(wx+wy)*.5*s-wz};
}

// Compute origin & scale to fit canvas
function fpLayout(cw,ch,dpr,rW,rD){
  const pad=14*dpr, wallH=26*dpr;
  const scale=Math.min((cw-pad*2)/((rW+rD)*.866), (ch-pad*2-wallH)/((rW+rD)*.5));
  return {o:{x:pad+rD*.866*scale, y:wallH+pad}, scale, wallH};
}

function fpPoly(ctx,pts){
  ctx.beginPath();
  pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.closePath();
}

// Ray-cast point-in-polygon
function fpHit(pts,px,py){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    if(((pts[i].y>py)!==(pts[j].y>py))&&
       px<(pts[j].x-pts[i].x)*(py-pts[i].y)/(pts[j].y-pts[i].y)+pts[i].x)
      inside=!inside;
  }
  return inside;
}

function fpFloor(ctx,rW,rD,o,s,dpr){
  const p=(x,y)=>fpIso(x,y,0,o,s);
  fpPoly(ctx,[p(0,0),p(rW,0),p(rW,rD),p(0,rD)]);
  ctx.fillStyle='rgba(255,255,255,.03)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.20)'; ctx.lineWidth=1.2*dpr; ctx.stroke();
  // 100 cm grid
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=.5*dpr;
  for(let x=100;x<rW;x+=100){const a=p(x,0),b=p(x,rD);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  for(let y=100;y<rD;y+=100){const a=p(0,y),b=p(rW,y);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  // 60 cm walkway dashes
  const ww=60;
  if(rW>ww*2+40&&rD>ww*2+40){
    ctx.setLineDash([4*dpr,4*dpr]); ctx.strokeStyle='rgba(255,255,255,.13)'; ctx.lineWidth=.8*dpr;
    fpPoly(ctx,[p(ww,ww),p(rW-ww,ww),p(rW-ww,rD-ww),p(ww,rD-ww)]);
    ctx.stroke(); ctx.setLineDash([]);
  }
}

function fpWalls(ctx,rW,rD,wallH,o,s){
  const p=(x,y,z)=>fpIso(x,y,z,o,s);
  fpPoly(ctx,[p(0,0,0),p(rW,0,0),p(rW,0,wallH),p(0,0,wallH)]);
  ctx.fillStyle='rgba(255,255,255,.055)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.13)'; ctx.lineWidth=.7; ctx.stroke();
  fpPoly(ctx,[p(0,0,0),p(0,rD,0),p(0,rD,wallH),p(0,0,wallH)]);
  ctx.fillStyle='rgba(255,255,255,.03)'; ctx.fill(); ctx.stroke();
}

function fpBlock(ctx,bx,by,bw,bd,bh,rgb,lit,o,s){
  const p=(x,y,z)=>fpIso(x,y,z,o,s);
  const [r,g,b_]=rgb; const al=lit?1:.82;
  // shadow
  ctx.shadowColor='rgba(0,0,0,.45)'; ctx.shadowBlur=6; ctx.shadowOffsetX=2; ctx.shadowOffsetY=3;
  // left face (y=by)
  fpPoly(ctx,[p(bx,by,0),p(bx+bw,by,0),p(bx+bw,by,bh),p(bx,by,bh)]);
  ctx.fillStyle=`rgba(${r*.58|0},${g*.58|0},${b_*.58|0},${al})`; ctx.fill();
  // right face (x=bx+bw)
  fpPoly(ctx,[p(bx+bw,by,0),p(bx+bw,by+bd,0),p(bx+bw,by+bd,bh),p(bx+bw,by,bh)]);
  ctx.fillStyle=`rgba(${r*.76|0},${g*.76|0},${b_*.76|0},${al})`; ctx.fill();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
  // top face (brightest)
  const top=[p(bx,by,bh),p(bx+bw,by,bh),p(bx+bw,by+bd,bh),p(bx,by+bd,bh)];
  fpPoly(ctx,top);
  ctx.fillStyle=lit?`rgba(${r},${g},${b_},1)`:`rgba(${r},${g},${b_},${al})`; ctx.fill();
  ctx.strokeStyle=lit?'rgba(255,255,255,.85)':'rgba(255,255,255,.28)';
  ctx.lineWidth=lit?1.8:.5; ctx.stroke();
  return top;
}

function fpLabel(ctx,text,bx,by,bw,bd,bh,o,s,dpr){
  const c=fpIso(bx+bw/2,by+bd/2,bh+6*dpr,o,s);
  ctx.save();
  ctx.font=`${Math.max(9,10*dpr)}px Inter,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.shadowColor='rgba(0,0,0,.95)'; ctx.shadowBlur=4*dpr;
  ctx.fillStyle='rgba(255,255,255,.92)';
  ctx.fillText(text.slice(0,5),c.x,c.y);
  ctx.restore();
}

function fpRedraw(canvas,rW,rD,blocks,litIdx){
  const wrap=canvas.parentElement;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const cw=wrap.clientWidth*dpr, ch=wrap.clientHeight*dpr;
  if(cw<4||ch<4) return {hitPolys:[],dpr};
  canvas.width=cw; canvas.height=ch;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,cw,ch);
  const {o,scale,wallH}=fpLayout(cw,ch,dpr,rW,rD);
  const bh=9*dpr;
  fpFloor(ctx,rW,rD,o,scale,dpr);
  fpWalls(ctx,rW,rD,wallH,o,scale);
  const hitPolys=blocks.map((bl,i)=>{
    const top=fpBlock(ctx,bl.bx,bl.by,bl.bw,bl.bd,bh,bl.rgb,i===litIdx,o,scale);
    fpLabel(ctx,bl.lbl,bl.bx,bl.by,bl.bw,bl.bd,bh,o,scale,dpr);
    return top;
  });
  return {hitPolys,dpr};
}

function fpInit(fpId,rec){
  const canvas=document.getElementById(fpId);
  if(!canvas) return;
  const rW=(rec.room_dims&&rec.room_dims.width_cm)||280;
  const rD=(rec.room_dims&&rec.room_dims.length_cm)||340;
  const topItems=(rec.items||[]).filter(i=>i.rank===1);
  const blocks=topItems.map(item=>{
    const z=FP_ZONES[item.category]||{fx:.35,fy:.35};
    const d=item.dimensions_cm||{};
    const bw=Math.min(d.width||80,rW*.5);
    const bd=Math.min(d.depth||60,rD*.5);
    return {
      category:item.category,
      lbl:CAT_LABELS[item.category]||item.category,
      bx:Math.max(2,Math.min(z.fx*rW,rW-bw-2)),
      by:Math.max(2,Math.min(z.fy*rD,rD-bd-2)),
      bw,bd,rgb:FP_RGB[item.category]||[160,160,200],
    };
  });

  let litIdx=-1;
  let hs=fpRedraw(canvas,rW,rD,blocks,litIdx);

  function setLit(idx){
    if(idx===litIdx) return;
    litIdx=idx;
    hs=fpRedraw(canvas,rW,rD,blocks,litIdx);
    const rc=canvas.closest('.rec-card');
    if(!rc) return;
    rc.querySelectorAll('.rec-pcard').forEach(el=>el.classList.remove('fp-active'));
    if(idx>=0){
      const card=rc.querySelector(`.rec-pcard[data-cat="${blocks[idx].category}"][data-rank="1"]`);
      if(card){card.classList.add('fp-active');card.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});}
    }
  }

  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    const px=(e.clientX-r.left)*hs.dpr, py=(e.clientY-r.top)*hs.dpr;
    let hit=-1;
    hs.hitPolys.forEach((poly,i)=>{if(fpHit(poly,px,py)) hit=i;});
    setLit(hit);
  });
  canvas.addEventListener('mouseleave',()=>setLit(-1));

  // rec-pcard hover → light up canvas block
  const rc=canvas.closest('.rec-card');
  if(rc){
    rc.querySelectorAll('.rec-pcard[data-rank="1"]').forEach(pcard=>{
      const idx=blocks.findIndex(b=>b.category===pcard.dataset.cat);
      if(idx<0) return;
      pcard.addEventListener('mouseenter',()=>{litIdx=idx;hs=fpRedraw(canvas,rW,rD,blocks,litIdx);});
      pcard.addEventListener('mouseleave',()=>{litIdx=-1;hs=fpRedraw(canvas,rW,rD,blocks,litIdx);});
    });
  }

  // Resize observer
  new ResizeObserver(()=>{hs=fpRedraw(canvas,rW,rD,blocks,litIdx);}).observe(canvas.parentElement);
}

// ══════════════════════════════════════════════════
// 3D CARD TILT — desktop only, rAF + IntersectionObserver
// ══════════════════════════════════════════════════
(function initCardTilt() {
  // Skip entirely on touch devices
  if (window.matchMedia('(pointer: coarse)').matches) return;

  const TILT_MAX = 12; // ±degrees

  // Bind / unbind when cards enter / leave viewport
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => e.isIntersecting ? bindCard(e.target) : unbindCard(e.target));
  }, { threshold: 0.1 });

  // Watch for new .rec-pcard nodes added by renderRec()
  new MutationObserver(() => {
    document.querySelectorAll('.rec-pcard:not([data-tilt])').forEach(card => {
      card.dataset.tilt = '1';
      io.observe(card);
    });
  }).observe(document.getElementById('messages'), { childList: true, subtree: true });

  function bindCard(card) {
    if (card._tilt) return; // already bound
    let rafId = null, tx = 0, ty = 0;

    const move = e => {
      const r = card.getBoundingClientRect();
      const nx = (e.clientX - r.left) / r.width  * 2 - 1; // -1 … +1
      const ny = (e.clientY - r.top)  / r.height * 2 - 1;
      tx = -ny * TILT_MAX;
      ty =  nx * TILT_MAX;
      // CSS custom props drive the ::after radial-gradient highlight
      card.style.setProperty('--light-x', ((nx + 1) / 2 * 100).toFixed(1) + '%');
      card.style.setProperty('--light-y', ((ny + 1) / 2 * 100).toFixed(1) + '%');
      if (!rafId) rafId = requestAnimationFrame(applyTilt);
    };

    const applyTilt = () => {
      rafId = null;
      card.style.transform =
        `rotateX(${tx.toFixed(2)}deg) rotateY(${ty.toFixed(2)}deg) translateZ(20px)`;
    };

    const enter = () => {
      // Fast response while tracking mouse
      card.style.transition = 'transform 0.08s ease, box-shadow 0.25s, border-color 0.25s';
      card.classList.add('tilt-active');
    };

    const leave = () => {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      // Slow, smooth return to flat
      card.style.transition = 'transform 0.6s ease, box-shadow 0.35s, border-color 0.25s';
      card.style.transform = '';
      card.style.removeProperty('--light-x');
      card.style.removeProperty('--light-y');
      card.classList.remove('tilt-active');
    };

    card._tilt = { move, enter, leave };
    card.addEventListener('mousemove', move);
    card.addEventListener('mouseenter', enter);
    card.addEventListener('mouseleave', leave);
  }

  function unbindCard(card) {
    const h = card._tilt;
    if (!h) return;
    card.removeEventListener('mousemove', h.move);
    card.removeEventListener('mouseenter', h.enter);
    card.removeEventListener('mouseleave', h.leave);
    delete card._tilt;
  }
})();

// ══════════════════════════════════════════════════
// THREE.JS 3D AUTH BACKGROUND
// ══════════════════════════════════════════════════
(function () {
  const canvas = document.getElementById('bgCanvas');

  // WebGL 지원 체크
  function webglSupported() {
    try {
      return !!(window.WebGLRenderingContext &&
        (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
    } catch (e) { return false; }
  }
  if (!webglSupported() || typeof THREE === 'undefined') return;

  // ── 상태 ──
  let renderer, scene, camera, animId, resizeHandler;
  const BG = 0x0a0e27;
  const C1 = 0x38bdf8;
  const C2 = 0x818cf8;
  const C3 = 0x6ee7f7;

  // ── 엣지 와이어프레임 헬퍼 ──
  function edgeLines(geo, color, opacity) {
    const edges = new THREE.EdgesGeometry(geo);
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity, depthWrite: false });
    return new THREE.LineSegments(edges, mat);
  }

  // ── 씬 구성 ──
  function buildScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(BG);
    scene.fog = new THREE.Fog(BG, 5, 15);

    // 조명
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const pl1 = new THREE.PointLight(C1, 1.6, 12);
    pl1.position.set(2.5, 3, 2);
    scene.add(pl1);
    const pl2 = new THREE.PointLight(C2, 0.9, 8);
    pl2.position.set(-2, 1.5, -2);
    scene.add(pl2);

    // ── 방 박스 와이어프레임 ──
    const roomLines = edgeLines(new THREE.BoxGeometry(4, 2.6, 4), C1, 0.16);
    scene.add(roomLines);

    // ── 침대 ──
    const bed = edgeLines(new THREE.BoxGeometry(1.4, 0.32, 2.1), C1, 0.50);
    bed.position.set(-1.05, -0.94, 0.55);
    scene.add(bed);
    // 헤드보드
    const hb = edgeLines(new THREE.BoxGeometry(1.4, 0.58, 0.07), C1, 0.38);
    hb.position.set(-1.05, -0.61, 1.52);
    scene.add(hb);
    // 침대 다리 4개
    [[-0.62, 0.88], [0.62, 0.88], [-0.62, -0.88], [0.62, -0.88]].forEach(([dx, dz]) => {
      const leg = edgeLines(new THREE.BoxGeometry(0.09, 0.18, 0.09), C1, 0.28);
      leg.position.set(-1.05 + dx, -1.19, 0.55 + dz);
      scene.add(leg);
    });

    // ── 책상 ──
    const desk = edgeLines(new THREE.BoxGeometry(1.3, 0.05, 0.62), C2, 0.52);
    desk.position.set(0.85, -0.32, -1.52);
    scene.add(desk);
    // 책상 다리
    [[-0.58, -0.26], [0.58, -0.26], [-0.58, 0.26], [0.58, 0.26]].forEach(([dx, dz]) => {
      const leg = edgeLines(new THREE.BoxGeometry(0.05, 0.62, 0.05), C2, 0.28);
      leg.position.set(0.85 + dx, -0.655, -1.52 + dz);
      scene.add(leg);
    });
    // 모니터
    const mon = edgeLines(new THREE.BoxGeometry(0.55, 0.35, 0.04), C3, 0.42);
    mon.position.set(0.85, -0.07, -1.76);
    scene.add(mon);

    // ── 의자 ──
    const cSeat = edgeLines(new THREE.BoxGeometry(0.46, 0.05, 0.46), C3, 0.50);
    cSeat.position.set(0.80, -0.57, -0.58);
    scene.add(cSeat);
    const cBack = edgeLines(new THREE.BoxGeometry(0.46, 0.52, 0.05), C3, 0.42);
    cBack.position.set(0.80, -0.27, -0.80);
    scene.add(cBack);
    // 의자 다리
    [[-0.20, -0.20], [0.20, -0.20], [-0.20, 0.20], [0.20, 0.20]].forEach(([dx, dz]) => {
      const leg = edgeLines(new THREE.BoxGeometry(0.04, 0.38, 0.04), C3, 0.25);
      leg.position.set(0.80 + dx, -0.775, -0.58 + dz);
      scene.add(leg);
    });

    // ── 수납 선반 ──
    const shelf = edgeLines(new THREE.BoxGeometry(0.82, 1.55, 0.30), C2, 0.40);
    shelf.position.set(-1.62, 0.02, -1.68);
    scene.add(shelf);
    // 선반 칸막이 3개
    [-0.42, 0.10, 0.55].forEach(y => {
      const div = edgeLines(new THREE.BoxGeometry(0.82, 0.03, 0.30), C2, 0.24);
      div.position.set(-1.62, y, -1.68);
      scene.add(div);
    });
  }

  // ── 렌더러 초기화 ──
  function initRenderer() {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(BG, 1);
  }

  // ── 카메라 초기화 ──
  function initCamera() {
    camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 2.2, 5.5);
    camera.lookAt(0, 0, 0);
  }

  // ── 애니메이션 루프 ──
  let angle = 0;
  function animate() {
    animId = requestAnimationFrame(animate);
    angle += 0.0008;
    camera.position.x = Math.sin(angle) * 5.5;
    camera.position.z = Math.cos(angle) * 5.5;
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  }

  // ── 리사이즈 ──
  function onResize() {
    if (!camera || !renderer) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  // ── PUBLIC: 시작 ──
  window._threeStart = function () {
    if (animId) return; // 이미 실행 중
    canvas.style.display = 'block';
    if (!renderer) {
      initRenderer();
      buildScene();
      initCamera();
    }
    resizeHandler = onResize;
    window.addEventListener('resize', resizeHandler);
    animate();
  };

  // ── PUBLIC: 정지 + dispose ──
  window._threeStop = function () {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    if (resizeHandler) { window.removeEventListener('resize', resizeHandler); resizeHandler = null; }
    if (renderer) { renderer.dispose(); renderer = null; }
    scene = null; camera = null;
    canvas.style.display = 'none';
  };

  // 페이지 로드 시 토큰 없으면 (=로그인 화면) 즉시 시작
  if (!localStorage.getItem('rf_token')) {
    window._threeStart();
  } else {
    canvas.style.display = 'none'; // 토큰 있으면 바로 채팅 전환되므로 숨김
  }
})();
</script>
