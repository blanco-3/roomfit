<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roomfit</title>
  <meta name="theme-color" content="#35c5f0" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo">room<span>fit</span></div>
      <div class="meta">웹 + 앱(PWA) 데모 · 로그인/다중사진 업로드 지원</div>
    </div>

    <div class="layout">
      <aside class="panel">
        <h1>개발자 테스트 로그인</h1>
        <div class="field"><label>이메일</label><input id="email" value="dev@roomfit.ai" /></div>
        <div class="field"><label>비밀번호</label><input id="password" type="password" value="devpass1234" /></div>
        <div class="grid2">
          <button onclick="register()">회원가입</button>
          <button onclick="login()">로그인</button>
        </div>
        <p id="authState" class="note">로그인 필요</p>

        <hr style="margin:14px 0;border:none;border-top:1px solid #eee" />

        <h2>방 입력</h2>
        <div class="grid2">
          <div class="field"><label>폭(cm)</label><input id="width" type="number" value="280" /></div>
          <div class="field"><label>길이(cm)</label><input id="length" type="number" value="340" /></div>
        </div>
        <div class="field"><label>예산(원)</label><input id="budget" type="number" value="1200000" /></div>
        <div class="grid2">
          <div class="field"><label>무드</label><select id="mood"><option>minimal_warm</option><option>minimal_white</option><option>scandinavian_light</option></select></div>
          <div class="field"><label>용도</label><select id="purpose"><option>work_sleep</option><option>focus_work</option><option>sleep_storage</option></select></div>
        </div>

        <div class="field">
          <label>방 사진 (2~12장)</label>
          <input id="photos" type="file" multiple accept="image/*" />
        </div>
        <div class="grid2">
          <button onclick="runDemo()">추천 생성</button>
          <button onclick="fetchGuidelines()">촬영 가이드</button>
        </div>

        <p id="roomInfo" class="note"></p>
      </aside>

      <main class="results">
        <h2>추천 결과</h2>
        <div class="kpi">
          <div class="box"><div class="label">총 가격</div><div id="kpiPrice" class="value">-</div></div>
          <div class="box"><div class="label">공간 적합도</div><div id="kpiFit" class="value">-</div></div>
          <div class="box"><div class="label">스타일 점수</div><div id="kpiStyle" class="value">-</div></div>
        </div>
        <div id="items" class="items"></div>
        <pre id="guide" class="result" style="margin-top:12px;display:none;"></pre>
      </main>
    </div>
  </div>

<script>
let token = localStorage.getItem('roomfit_token') || null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}

function authHeaders() {
  if (!token) return {'Content-Type': 'application/json'};
  return {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`};
}

function setAuthState(text) {
  document.getElementById('authState').textContent = text;
}

async function register() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const r = await fetch('/v1/auth/register', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email, password, display_name: 'Developer'})
  });
  const d = await r.json();
  if (!r.ok) return setAuthState('회원가입 실패: ' + (d.detail || 'error'));
  token = d.token; localStorage.setItem('roomfit_token', token);
  setAuthState(`로그인됨: ${d.user.email}`);
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const r = await fetch('/v1/auth/login', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email, password})
  });
  const d = await r.json();
  if (!r.ok) return setAuthState('로그인 실패: ' + (d.detail || 'error'));
  token = d.token; localStorage.setItem('roomfit_token', token);
  setAuthState(`로그인됨: ${d.user.email}`);
}

const fmt = (n) => new Intl.NumberFormat('ko-KR').format(n);

function renderItems(items = []) {
  const root = document.getElementById('items');
  if (!items.length) {
    root.innerHTML = '<p class="meta">아직 추천 결과가 없습니다.</p>';
    return;
  }
  root.innerHTML = items.map(item => `
    <article class="item">
      <span class="badge">${item.category}</span>
      <h3>${item.name}</h3>
      <p>가격: ${fmt(item.price_krw)}원</p>
      <p>치수: ${item.dimensions_cm.width} x ${item.dimensions_cm.depth} x ${item.dimensions_cm.height} cm</p>
      <p>추천 사유: ${item.reason}</p>
      <a href="${item.url}" target="_blank" rel="noreferrer">상품 보러가기</a>
    </article>
  `).join('');
}

async function uploadPhotos(roomId) {
  const files = document.getElementById('photos').files;
  if (!files.length) return '사진 업로드 생략';
  const form = new FormData();
  form.append('room_id', roomId);
  for (const f of files) form.append('files', f);

  const r = await fetch('/v1/room/photos', {
    method: 'POST',
    headers: token ? {'Authorization': `Bearer ${token}`} : {},
    body: form
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.detail || '사진 업로드 실패');
  return `${d.uploaded_count}장 업로드`;
}

async function runDemo() {
  if (!token) return setAuthState('먼저 로그인해줘');
  const width = Number(document.getElementById('width').value);
  const length = Number(document.getElementById('length').value);
  const budget = Number(document.getElementById('budget').value);
  const mood = document.getElementById('mood').value;
  const purpose = document.getElementById('purpose').value;

  const estimateRes = await fetch('/v1/room/estimate', {
    method: 'POST', headers: authHeaders(),
    body: JSON.stringify({ width_cm: width, length_cm: length, budget_krw: budget, mood, purpose })
  });
  const estimateData = await estimateRes.json();
  if (!estimateRes.ok) return setAuthState('방 생성 실패: ' + (estimateData.detail || 'error'));

  const roomId = estimateData.room_profile.room_id;
  let uploadMsg = '';
  try { uploadMsg = await uploadPhotos(roomId); } catch (e) { uploadMsg = e.message; }

  const recRes = await fetch('/v1/recommendations', {
    method: 'POST', headers: authHeaders(),
    body: JSON.stringify({ room_id: roomId, required_categories: ['bed', 'desk', 'chair', 'storage'] })
  });
  const recData = await recRes.json();
  if (!recRes.ok) return setAuthState('추천 실패: ' + (recData.detail || 'error'));

  document.getElementById('roomInfo').textContent = `room_id: ${roomId} · ${uploadMsg}`;
  const s = recData.summary || {};
  document.getElementById('kpiPrice').textContent = s.total_price_krw ? `${fmt(s.total_price_krw)}원` : '-';
  document.getElementById('kpiFit').textContent = s.fit_score ?? '-';
  document.getElementById('kpiStyle').textContent = s.style_score ?? '-';
  renderItems(recData.items || []);
}

async function fetchGuidelines() {
  const r = await fetch('/v1/scan-guidelines');
  const d = await r.json();
  const g = document.getElementById('guide');
  g.style.display = 'block';
  g.textContent = JSON.stringify(d, null, 2);
}

if (token) setAuthState('기존 세션 토큰 감지됨');
renderItems();
</script>
</body>
</html>
